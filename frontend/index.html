<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>URL Shortener</h1>

    <input type="text" id="urlInput" placeholder="Enter your long URL here">

    <!-- IMPORTANT: type="button" prevents refresh -->
    <button type="button" onclick="shortenUrl()">
        Shorten URL
    </button>

    <div id="result"></div>
</div>

<script src="app.js"></script>

</body>
</html>
